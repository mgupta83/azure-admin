# Azure Pipeline for Azure Admin UI
# This pipeline builds and deploys the monitoring UI to Azure Static Web Apps

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - packages/ui/*
      - package.json
      - turbo.json

pr:
  branches:
    include:
      - main
  paths:
    include:
      - packages/ui/*
      - package.json
      - turbo.json

variables:
  - group: azure-admin-variables # Create this variable group in Azure DevOps
  - name: nodeVersion
    value: '18.x'
  - name: buildConfiguration
    value: 'production'

stages:
  - stage: Build
    displayName: 'Build Application'
    jobs:
      - job: BuildUI
        displayName: 'Build React UI'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js $(nodeVersion)'
            inputs:
              versionSpec: '$(nodeVersion)'

          - task: Cache@2
            displayName: 'Cache node modules'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(System.DefaultWorkingDirectory)/node_modules

          - script: |
              npm ci
            displayName: 'Install dependencies'

          - script: |
              npm run build
            displayName: 'Build application'
            env:
              VITE_AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
              VITE_AZURE_TENANT_ID: $(AZURE_TENANT_ID)

          - script: |
              npm run test
            displayName: 'Run tests'
            continueOnError: true

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results.xml'
              searchFolder: '$(System.DefaultWorkingDirectory)'

          - task: PublishCodeCoverageResults@1
            displayName: 'Publish code coverage'
            condition: succeededOrFailed()
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage/cobertura-coverage.xml'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish build artifacts'
            inputs:
              pathToPublish: '$(System.DefaultWorkingDirectory)/packages/ui/dist'
              artifactName: 'ui-build'
              publishLocation: 'Container'

  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: Build
    condition: and(succeeded(), in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop'))
    jobs:
      - deployment: DeployToStaging
        displayName: 'Deploy to Staging'
        condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'azure-admin-staging'
        
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  displayName: 'Download build artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'ui-build'
                    downloadPath: '$(System.ArtifactsDirectory)'

                - task: AzureStaticWebApp@0
                  displayName: 'Deploy to Azure Static Web App (Staging)'
                  inputs:
                    app_location: '$(System.ArtifactsDirectory)/ui-build'
                    skip_app_build: true
                    azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING)

      - deployment: DeployToProduction
        displayName: 'Deploy to Production'
        condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'azure-admin-production'
        
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  displayName: 'Download build artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'ui-build'
                    downloadPath: '$(System.ArtifactsDirectory)'

                - task: AzureStaticWebApp@0
                  displayName: 'Deploy to Azure Static Web App (Production)'
                  inputs:
                    app_location: '$(System.ArtifactsDirectory)/ui-build'
                    skip_app_build: true
                    azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_PRODUCTION)